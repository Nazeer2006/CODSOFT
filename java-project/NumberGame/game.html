<!DOCTYPE html>
<html lang="en">
<head>
    <title>Advanced Number Guessing Game</title>
    <link rel="stylesheet" href="game.css">
</head>
<body>

<div class="container">

    <h1>🎯 Guess The Number</h1>

    <!-- Difficulty -->
    <select id="difficulty">
        <option value="easy">Easy (1-50)</option>
        <option value="medium">Medium (1-100)</option>
        <option value="hard">Hard (1-200)</option>
    </select>

    <button onclick="startGame()">Start Game</button>

    <div class="game-area">
        <input type="number" id="guess" placeholder="Enter your guess">
        <button onclick="checkGuess()">Guess</button>

        <p id="message"></p>
        <p id="attempts"></p>
        <p id="score"></p>
    </div>

    <button onclick="restartGame()" class="restart">Play Again</button>

</div>

<script src="game.js"></script>
</body>
</html>
